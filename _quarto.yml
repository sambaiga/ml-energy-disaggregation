project:
  type: book
  output-dir: _book

book:
  title: "Machine Learning for Smart Meter Data"
  subtitle: "A Structured Path from Meter Signal to Business Insight"
  description: "A structured, project-based path through smart meter data: disaggregation, forecasting, anomaly detection, and grid-edge value, from raw signal to business insight."
  author: "Anthony Faustine"
  date: today
  favicon: assets/favicon.svg
  site-url: "https://sambaiga.github.io/ml-energy-disaggregation/"
  repo-url: "https://github.com/sambaiga/ml-energy-disaggregation"
  repo-branch: main
  repo-actions: [edit, issue, source]
  search: true
  page-navigation: true
  bread-crumbs: false

  sidebar:
    collapse-level: 1

  navbar:
    right:
      - icon: envelope-at
        href: "mailto:sambaiga@gmail.com"
        aria-label: "Email Anthony Faustine"
      - icon: linkedin
        href: "https://www.linkedin.com/in/sambaiga"
        aria-label: "LinkedIn"
      - icon: github
        href: https://github.com/sambaiga/ml-energy-disaggregation
        aria-label: "View source on GitHub"

  page-footer:
    left: |
      <span class="faux-block">&copy; 2025&ndash;2026 <a href="https://sambaiga.github.io/">Anthony Faustine</a></span>
      <span class="faux-block">Code licensed under <a href="https://www.apache.org/licenses/LICENSE-2.0">Apache 2.0</a></span>
    center: |
      <div class="footer-social">
        <a href="mailto:sambaiga@gmail.com" title="Email"><i class="bi bi-envelope-at-fill"></i></a>
        <a href="https://github.com/sambaiga" title="GitHub"><i class="bi bi-github"></i></a>
        <a href="https://www.linkedin.com/in/sambaiga" title="LinkedIn"><i class="bi bi-linkedin"></i></a>
      </div>
    right: |
      <span class="faux-block">Made with <a href="https://quarto.org">Quarto</a></span>
      <span class="faux-block"><a href="https://github.com/sambaiga/ml-energy-disaggregation"><i class="bi bi-github"></i> View source</a></span>

  chapters:
    - index.qmd
    - preface.qmd
    - how-to-use.qmd
    - part: "Part 3: Disaggregation"
      chapters:
        - book/03-disaggregation/01-what-is-nilm.qmd
        - book/03-disaggregation/02-feature-engineering.qmd
        - book/03-disaggregation/03-multi-appliance-recognition.qmd
        - book/03-disaggregation/04-multi-task-low-frequency.qmd
    - part: "Part 4: LV Network and Topology Foundations"
      chapters:
        - book/04-network-foundations/01-opendss-lv-modeling.qmd
        - book/04-network-foundations/02-timeseries-der-modeling.qmd
        - book/04-network-foundations/03-phase-identification.qmd
    - part: "Part 5: Clustering"
      chapters:
        - book/05-clustering/01-clustering-foundations.qmd
        - book/05-clustering/02-clustering-methodology.qmd
        - book/05-clustering/03-customer-feeder-clustering.qmd
        # Chapter 4 (Alternative Representations, Tested Honestly) lands here
        # once the new London/GoiEner notebooks exist; numbering already
        # reserved so Chapter 5 below doesn't need a second renumbering pass.
        - book/05-clustering/05-feeder-level-clustering.qmd
    - part: "Part 6: Ranking and Recommendation"
      chapters:
        - book/06-ranking-recommendation/01-ranking-recommendation.qmd
    - part: "Part 7: Anomaly Detection"
      chapters:
        - book/07-anomaly-detection/01-anomaly-detection.qmd
    - part: "Part 8: Forecasting"
      chapters:
        - book/08-forecasting/01-forecastability.qmd
        - book/08-forecasting/02-scaling-archetypes.qmd
        - book/08-forecasting/03-probabilistic-forecasting.qmd
        - book/08-forecasting/04-foundation-models.qmd
        - book/08-forecasting/05-what-if-scenario-analysis.qmd
        - book/08-forecasting/06-lv-state-estimation.qmd
    - about.qmd
    - acronyms.qmd

  # Parts are added chapter by chapter as each is written.
  #  - part: "Part 1: Signal Foundations"
  #    chapters:
  #      - book/01-foundations/01-intro.ipynb
  #  - part: "Part 2: ML Foundations"
  #    chapters:
  #      - book/02-ml-foundations/01-what-is-ml.ipynb


csl: book/_quarto/ieee.csl

filters:
  - acronyms

acronyms:
  fromfile: acronyms.yml
  insert_loa: false

icons:
  bootstrap: true

format:
  html:
    # References render at the end of each chapter, not consolidated, so a
    # citation's link target can't be reliably scoped to "this chapter" by
    # Quarto/pandoc across a multi-chapter book (see quarto-dev/quarto-cli
    # discussion #11873 - no per-chapter bibliography scoping exists yet).
    # Disable citation hyperlinking rather than ship links that silently
    # jump to the wrong chapter; the full reference is a scroll away either way.
    link-citations: false
    open-graph: true
    twitter-card: true
    theme:
      light: [cosmo, book/_quarto/brand.scss]
      dark: [darkly, book/_quarto/brand-dark.scss]
    highlight-style: github
    code-fold: false
    code-copy: true
    code-link: false
    toc: true
    toc-depth: 3
    toc-title: "In this chapter"
    number-sections: false
    fig-cap-location: bottom
    anchor-sections: true
    # smooth-scroll loads zenscroll AFTER require.js, and zenscroll's own
    # anonymous UMD define() collides with RequireJS (a documented Quarto
    # bug, quarto-dev/quarto-cli#10846), which silently breaks every
    # lets-plot chart's own script tag later in the page. Disabled until
    # upstream fixes the script ordering.
    smooth-scroll: false

freeze: auto
jupyter: python3
execute:
  enabled: true
  error: true
  warning: false
  cache: false
