name: Check Notebooks

on:
  push:
    branches:
      - main
    paths:
      - "book/**/*.ipynb"
      - "book/**/data/**"
      - "ark/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "book/**/*.ipynb"
      - "book/**/data/**"
      - "ark/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve changed notebooks
        id: changed
        run: |
          # Notebooks skipped from CI execution (not ready, too slow, or
          # dependent on gitignored local data).
          # book/02-disaggregation/02-feature-engineering-code.ipynb loads
          # real PLAID/LILACD data from resources/nilm-code/AWRGNILM, the
          # author's own research code, gitignored and not available in CI.
          # book/02-disaggregation/03-multi-appliance-recognition-code.ipynb
          # loads real multi-label PLAID data from resources/nilm-code/MLCFCD,
          # same reason.
          # book/02-disaggregation/04-multi-task-low-frequency-code.ipynb
          # loads real UK-DALE data from resources/nilm-code/UNETNiLM, same
          # reason.
          # book/04-grid-edge/04-customer-feeder-clustering-code.ipynb's
          # feeder-level section loads resources/smart-ds/AUS_P1U, fetched
          # locally via scripts/fetch_part4_smartds_data.py (~340MB across
          # 500+ individual S3 requests), gitignored and too slow/fragile
          # to fetch fresh on every CI run.
          # All four notebooks' outputs are committed and {{< embed >}}
          # reads them directly without re-executing the notebook, so the
          # rendered book is unaffected; only this from-scratch CI
          # re-execution can't run them.
          SKIP_LIST="book/02-disaggregation/02-feature-engineering-code.ipynb book/02-disaggregation/03-multi-appliance-recognition-code.ipynb book/02-disaggregation/04-multi-task-low-frequency-code.ipynb book/04-grid-edge/04-customer-feeder-clustering-code.ipynb"

          # Helper: find all notebooks, excluding archived ones
          find_notebooks() {
            find book -name "*.ipynb" -not -path "*/_archive/*" | sort | tr '\n' ' '
          }

          # Determine base commit to diff against
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: run every notebook minus skipped ones
            ALL=$(find_notebooks)
            for nb in $SKIP_LIST; do ALL="${ALL//$nb /}"; done
            echo "notebooks=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              # git rev-parse leaks an unresolved ref to stdout even on
              # failure, so redirecting only stderr isn't enough to guard
              # the fallback: test existence first, on a repo with no
              # parent commit (the very first push) HEAD~1 doesn't exist.
              if git rev-parse --verify -q HEAD~1 >/dev/null 2>&1; then
                BASE="$(git rev-parse HEAD~1)"
              else
                BASE="$(git rev-parse HEAD)"
              fi
            else
              BASE="$BEFORE"
            fi
          fi

          # If shared library or package deps changed, run every notebook
          # Note: workflow file changes alone do not require re-running all notebooks
          DEPS=$(git diff --name-only "$BASE" "${{ github.sha }}" -- ark/ pyproject.toml uv.lock)
          if [ -n "$DEPS" ]; then
            echo "Dependency files changed -- running all notebooks"
            ALL=$(find_notebooks)
            for nb in $SKIP_LIST; do ALL="${ALL//$nb /}"; done
            echo "notebooks=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Otherwise: only notebooks that changed in this push/PR
          CHANGED=$(git diff --name-only --diff-filter=d "$BASE" "${{ github.sha }}" -- '*.ipynb' | grep -v '/_archive/' | sort)
          for nb in $SKIP_LIST; do CHANGED=$(echo "$CHANGED" | grep -vxF "$nb" || true); done
          NOTEBOOKS=$(echo "$CHANGED" | tr '\n' ' ' | xargs)
          echo "notebooks=$NOTEBOOKS" >> "$GITHUB_OUTPUT"

      - name: Install uv
        if: steps.changed.outputs.notebooks != ''
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Cache uv dependencies
        if: steps.changed.outputs.notebooks != ''
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-notebooks-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-notebooks-

      - name: Install dependencies
        if: steps.changed.outputs.notebooks != ''
        run: uv sync --extra dev --extra modelling --extra test --extra grid

      - name: Configure nbdime git drivers
        if: steps.changed.outputs.notebooks != ''
        run: uv run nbdime config-git --enable

      - name: Register ark kernel
        if: steps.changed.outputs.notebooks != ''
        run: uv run python -m ipykernel install --user --name ark --display-name "ark"

      - name: Fetch Part 4 AusNet data
        if: steps.changed.outputs.notebooks != ''
        run: uv run python scripts/fetch_part4_ausnet_data.py

      - name: Fetch Part 4 EV profiles
        if: steps.changed.outputs.notebooks != ''
        run: uv run python scripts/fetch_part4_ev_profiles.py

      - name: Execute changed notebooks
        if: steps.changed.outputs.notebooks != ''
        run: |
          uv run --with nbmake pytest --nbmake \
            --nbmake-timeout=300 \
            --no-header \
            -v \
            --override-ini=addopts= \
            ${{ steps.changed.outputs.notebooks }}
        env:
          PYTHONWARNINGS: ignore
