name: Check Notebooks

on:
  push:
    branches:
      - main
    paths:
      - "book/**/*.ipynb"
      - "book/**/data/**"
      - "ark/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "book/**/*.ipynb"
      - "book/**/data/**"
      - "ark/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve changed notebooks
        id: changed
        run: |
          # Notebooks skipped from CI execution (not ready, too slow, or
          # dependent on gitignored local data).
          # book/03-disaggregation/02-feature-engineering-code.ipynb loads
          # real PLAID/LILACD data from resources/nilm-code/AWRGNILM, the
          # author's own research code, gitignored and not available in CI.
          # book/03-disaggregation/03-multi-appliance-recognition-code.ipynb
          # loads real multi-label PLAID data from resources/nilm-code/MLCFCD,
          # same reason.
          # book/03-disaggregation/04-multi-task-low-frequency-code.ipynb
          # loads real UK-DALE data from resources/nilm-code/UNETNiLM, same
          # reason.
          # book/05-clustering/03-customer-clustering-code.ipynb's
          # feeder-level section loads resources/smart-ds/AUS_P1U, fetched
          # locally via scripts/fetch_part4_smartds_data.py (~340MB across
          # 500+ individual S3 requests), gitignored and too slow/fragile
          # to fetch fresh on every CI run.
          # book/06-ranking-recommendation/01-ranking-recommendation-code.ipynb and
          # book/07-anomaly-detection/01-anomaly-detection-code.ipynb both solve
          # a live OpenDSS power flow across the UK network's 414 real
          # feeders (18,997 loads), several minutes each, too slow to
          # re-run on every CI trigger alongside every other notebook.
          # book/08-forecasting/04-foundation-models-code.ipynb runs real
          # zero-shot inference with Chronos-2 and TimesFM against all 342
          # AusNet customers plus 200 NREL buildings; confirmed to take
          # about 14 minutes end to end on a local Apple Silicon machine
          # (TimesFM alone is the bulk of that, ~1.1s/customer, no batching
          # support), and a real CI run exceeded this job's own 45-minute
          # timeout on a slower/cold GitHub-hosted runner plus first-time HF
          # weight downloads. All seven notebooks' outputs are committed and
          # {{< embed >}} reads them directly without re-executing the
          # notebook, so the rendered book is unaffected; only this
          # from-scratch CI re-execution can't run them.
          # book/05-clustering/04-customer-feeder-clustering-goiener-code.ipynb
          # is the same exploratory replica against GoiEner: needs
          # resources/goiener/data/imp-post.tzst, fetched locally via
          # scripts/fetch_goiener_data.py, gitignored and not available in
          # CI (zstandard itself is now a real project dependency).
          # book/05-clustering/04-customer-feeder-clustering-goiener-tucker-code.ipynb
          # needs the same gitignored GoiEner archive plus tensorly (not a
          # project dependency).
          # book/05-clustering/04-customer-feeder-clustering-goiener-chronos-embed-code.ipynb
          # needs the same gitignored GoiEner archive, and downloads/runs
          # the real Chronos-2 foundation model (already skip-listed
          # elsewhere for the same real inference-cost reason as
          # book/08-forecasting/04-foundation-models-code.ipynb).
          # book/05-clustering/04-customer-feeder-clustering-goiener-diffusion-code.ipynb
          # rebuilds both embeddings above, so needs the same gitignored
          # archive, tensorly, and Chronos-2 dependencies.
          # book/05-clustering/04-customer-feeder-clustering-goiener-multires-code.ipynb
          # and book/05-clustering/04-customer-feeder-clustering-goiener-crocs-code.ipynb
          # both need the same gitignored GoiEner archive (confirmed
          # directly: both stream imp-post.tzst identically to the base
          # GoiEner replica above), missing from the SKIP_LIST when first
          # merged.
          # book/05-clustering/02-clustering-methodology-code.ipynb runs a 400-trial NSGA-II
          # (Optuna) multi-objective search over feature set, scaler, reducer,
          # and clusterer as a single cell; confirmed to take about 53 minutes
          # on a local Apple Silicon machine. Locally this is a one-time cost,
          # since Optuna persists the study to resources/.optuna_cache/ and
          # every rerun after the first loads it instead of re-searching, but
          # that cache directory is gitignored (resources/*), so a from-scratch
          # CI run has no study to load and reruns the full search, exceeding
          # this job's own per-cell nbmake timeout the same way the foundation-
          # models notebook above exceeds the job timeout. The notebook's own
          # outputs are committed and {{< embed >}} reads them directly.
          SKIP_LIST="book/03-disaggregation/02-feature-engineering-code.ipynb book/03-disaggregation/03-multi-appliance-recognition-code.ipynb book/03-disaggregation/04-multi-task-low-frequency-code.ipynb book/05-clustering/03-customer-clustering-code.ipynb book/06-ranking-recommendation/01-ranking-recommendation-code.ipynb book/07-anomaly-detection/01-anomaly-detection-code.ipynb book/08-forecasting/04-foundation-models-code.ipynb book/05-clustering/04-customer-feeder-clustering-goiener-code.ipynb book/05-clustering/04-customer-feeder-clustering-goiener-tucker-code.ipynb book/05-clustering/04-customer-feeder-clustering-goiener-chronos-embed-code.ipynb book/05-clustering/04-customer-feeder-clustering-goiener-diffusion-code.ipynb book/05-clustering/04-customer-feeder-clustering-goiener-multires-code.ipynb book/05-clustering/04-customer-feeder-clustering-goiener-crocs-code.ipynb book/05-clustering/02-clustering-methodology-code.ipynb"

          # Helper: find all notebooks, excluding archived ones
          find_notebooks() {
            find book -name "*.ipynb" -not -path "*/_archive/*" | sort | tr '\n' ' '
          }

          # Determine base commit to diff against
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: run every notebook minus skipped ones
            ALL=$(find_notebooks)
            for nb in $SKIP_LIST; do ALL="${ALL//$nb /}"; done
            echo "notebooks=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              # git rev-parse leaks an unresolved ref to stdout even on
              # failure, so redirecting only stderr isn't enough to guard
              # the fallback: test existence first, on a repo with no
              # parent commit (the very first push) HEAD~1 doesn't exist.
              if git rev-parse --verify -q HEAD~1 >/dev/null 2>&1; then
                BASE="$(git rev-parse HEAD~1)"
              else
                BASE="$(git rev-parse HEAD)"
              fi
            else
              BASE="$BEFORE"
            fi
          fi

          # If shared library or package deps changed, run every notebook
          # Note: workflow file changes alone do not require re-running all notebooks
          DEPS=$(git diff --name-only "$BASE" "${{ github.sha }}" -- ark/ pyproject.toml uv.lock)
          if [ -n "$DEPS" ]; then
            echo "Dependency files changed -- running all notebooks"
            ALL=$(find_notebooks)
            for nb in $SKIP_LIST; do ALL="${ALL//$nb /}"; done
            echo "notebooks=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Otherwise: only notebooks that changed in this push/PR
          CHANGED=$(git diff --name-only --diff-filter=d "$BASE" "${{ github.sha }}" -- '*.ipynb' | grep -v '/_archive/' | sort)
          for nb in $SKIP_LIST; do CHANGED=$(echo "$CHANGED" | grep -vxF "$nb" || true); done
          NOTEBOOKS=$(echo "$CHANGED" | tr '\n' ' ' | xargs)
          echo "notebooks=$NOTEBOOKS" >> "$GITHUB_OUTPUT"

      - name: Install uv
        if: steps.changed.outputs.notebooks != ''
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Cache uv dependencies
        if: steps.changed.outputs.notebooks != ''
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-notebooks-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-notebooks-

      - name: Install dependencies
        if: steps.changed.outputs.notebooks != ''
        run: uv sync --extra dev --extra modelling --extra test --extra grid --extra foundational --extra state-estimation

      - name: Configure nbdime git drivers
        if: steps.changed.outputs.notebooks != ''
        run: uv run nbdime config-git --enable

      - name: Register ark kernel
        if: steps.changed.outputs.notebooks != ''
        run: uv run python -m ipykernel install --user --name ark --display-name "ark"

      - name: Fetch Part 4 AusNet data
        if: steps.changed.outputs.notebooks != ''
        run: uv run python scripts/fetch_part4_ausnet_data.py

      - name: Fetch Part 4 EV profiles
        if: steps.changed.outputs.notebooks != ''
        run: uv run python scripts/fetch_part4_ev_profiles.py

      - name: Fetch Part 5 NREL buildstock data
        if: steps.changed.outputs.notebooks != ''
        run: uv run python scripts/fetch_part5_nrel_buildstock_data.py

      - name: Execute changed notebooks
        if: steps.changed.outputs.notebooks != ''
        run: |
          uv run --with nbmake pytest --nbmake \
            --nbmake-timeout=600 \
            --no-header \
            -v \
            --override-ini=addopts= \
            ${{ steps.changed.outputs.notebooks }}
        env:
          PYTHONWARNINGS: ignore
