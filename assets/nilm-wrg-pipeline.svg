<svg viewBox="0 0 520 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="1" y="1" width="518" height="238" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="260" y="26" text-anchor="middle" font-family="'Jost', system-ui, sans-serif" font-size="12" font-weight="700" fill="#334155">FROM ONE ACTIVATION TO ONE LABEL</text>

  <!-- Stage 1: activation window -->
  <rect x="18" y="60" width="88" height="70" rx="8" fill="#7C3AED" fill-opacity="0.08" stroke="#7C3AED" stroke-width="1.5"/>
  <polyline points="30,100 38,84 46,116 54,90 62,108 70,96 78,102 86,98"
    stroke="#7C3AED" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
  <text x="62" y="150" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#5B21B6">Activation</text>
  <text x="62" y="162" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#5B21B6">window</text>

  <line x1="106" y1="95" x2="132" y2="95" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Stage 2: distance matrix -->
  <rect x="132" y="60" width="88" height="70" rx="8" fill="#64748B" fill-opacity="0.08" stroke="#64748B" stroke-width="1.5"/>
  <g stroke="#64748B" stroke-width="0.5">
    <line x1="146" y1="72" x2="146" y2="118"/>
    <line x1="158" y1="72" x2="158" y2="118"/>
    <line x1="170" y1="72" x2="170" y2="118"/>
    <line x1="182" y1="72" x2="182" y2="118"/>
    <line x1="194" y1="72" x2="194" y2="118"/>
    <line x1="146" y1="72" x2="206" y2="72"/>
    <line x1="146" y1="84" x2="206" y2="84"/>
    <line x1="146" y1="96" x2="206" y2="96"/>
    <line x1="146" y1="108" x2="206" y2="108"/>
  </g>
  <rect x="146" y="72" width="12" height="12" fill="#64748B" fill-opacity="0.55"/>
  <rect x="182" y="84" width="12" height="12" fill="#64748B" fill-opacity="0.3"/>
  <rect x="158" y="96" width="12" height="12" fill="#64748B" fill-opacity="0.75"/>
  <rect x="194" y="108" width="12" height="12" fill="#64748B" fill-opacity="0.2"/>
  <text x="176" y="150" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#334155">Distance</text>
  <text x="176" y="162" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#334155">matrix D</text>

  <line x1="220" y1="95" x2="246" y2="95" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Stage 3: WRG image -->
  <rect x="246" y="60" width="88" height="70" rx="8" fill="#7C3AED" fill-opacity="0.1" stroke="#5B21B6" stroke-width="1.5"/>
  <rect x="260" y="72" width="12" height="12" fill="#7C3AED" fill-opacity="0.9"/>
  <rect x="272" y="72" width="12" height="12" fill="#7C3AED" fill-opacity="0.3"/>
  <rect x="284" y="72" width="12" height="12" fill="#7C3AED" fill-opacity="0.6"/>
  <rect x="260" y="84" width="12" height="12" fill="#7C3AED" fill-opacity="0.5"/>
  <rect x="272" y="84" width="12" height="12" fill="#7C3AED" fill-opacity="0.95"/>
  <rect x="284" y="84" width="12" height="12" fill="#7C3AED" fill-opacity="0.2"/>
  <rect x="260" y="96" width="12" height="12" fill="#7C3AED" fill-opacity="0.15"/>
  <rect x="272" y="96" width="12" height="12" fill="#7C3AED" fill-opacity="0.5"/>
  <rect x="284" y="96" width="12" height="12" fill="#7C3AED" fill-opacity="0.85"/>
  <text x="290" y="150" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#5B21B6">Weighted</text>
  <text x="290" y="162" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#5B21B6">recurrence graph</text>

  <line x1="334" y1="95" x2="360" y2="95" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Stage 4: CNN classifier -->
  <rect x="360" y="60" width="80" height="70" rx="8" fill="#64748B" fill-opacity="0.08" stroke="#64748B" stroke-width="1.5"/>
  <rect x="372" y="75" width="13" height="40" rx="2" fill="none" stroke="#334155" stroke-width="1.3"/>
  <rect x="389" y="80" width="13" height="30" rx="2" fill="none" stroke="#334155" stroke-width="1.3"/>
  <rect x="406" y="85" width="13" height="20" rx="2" fill="none" stroke="#334155" stroke-width="1.3"/>
  <text x="400" y="150" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#334155">CNN</text>
  <text x="400" y="162" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#334155">classifier</text>

  <line x1="440" y1="95" x2="460" y2="95" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Output -->
  <circle cx="488" cy="95" r="26" fill="#7C3AED" fill-opacity="0.12" stroke="#5B21B6" stroke-width="2"/>
  <path d="M 478 95 L 485 102 L 499 86" stroke="#5B21B6" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="488" y="150" text-anchor="middle" font-family="'Jost', system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#1E293B">Appliance</text>

  <line x1="18" y1="200" x2="502" y2="200" stroke="#E2E8F0" stroke-width="1"/>
  <text x="260" y="222" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="10.5" fill="#334155">the same three-layer CNN classifies WRG, V-I, and AWRG images alike</text>
</svg>
