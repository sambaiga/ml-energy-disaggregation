<svg viewBox="0 0 520 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="1" y="1" width="518" height="238" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="260" y="26" text-anchor="middle" font-family="'Jost', system-ui, sans-serif" font-size="12" font-weight="700" fill="#334155">ONE EVENT, TWO WINDOWS</text>

  <!-- Shaded before/after regions -->
  <rect x="40" y="46" width="220" height="114" fill="#64748B" fill-opacity="0.08"/>
  <rect x="260" y="46" width="220" height="114" fill="#7C3AED" fill-opacity="0.08"/>

  <!-- Baseline -->
  <line x1="40" y1="110" x2="480" y2="110" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Event marker -->
  <line x1="260" y1="46" x2="260" y2="160" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="260" y="40" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="9" font-weight="600" fill="#334155">state transition</text>

  <!-- Before waveform (slate) -->
  <polyline points="40,110.0 44,99.1 48,96.4 52,103.9 56,116.1 60,123.6 64,120.9 68,110.0 72,99.1 76,96.4 80,103.9 84,116.1 88,123.6 92,120.9 96,110.0 100,99.1 104,96.4 108,103.9 112,116.1 116,123.6 120,120.9 124,110.0 128,99.1 132,96.4 136,103.9 140,116.1 144,123.6 148,120.9 152,110.0 156,99.1 160,96.4 164,103.9 168,116.1 172,123.6 176,120.9 180,110.0 184,99.1 188,96.4 192,103.9 196,116.1 200,123.6 204,120.9 208,110.0 212,99.1 216,96.4 220,103.9 224,116.1 228,123.6 232,120.9 236,110.0 240,99.1 244,96.4 248,103.9 252,116.1 256,123.6 260,120.9"
    stroke="#64748B" stroke-width="1.8" fill="none" stroke-linejoin="round"/>

  <!-- After waveform (violet, larger amplitude: appliance now drawing current) -->
  <polyline points="260,110.0 264,88.1 268,82.7 272,97.9 276,122.1 280,137.3 284,131.9 288,110.0 292,88.1 296,82.7 300,97.9 304,122.1 308,137.3 312,131.9 316,110.0 320,88.1 324,82.7 328,97.9 332,122.1 336,137.3 340,131.9 344,110.0 348,88.1 352,82.7 356,97.9 360,122.1 364,137.3 368,131.9 372,110.0 376,88.1 380,82.7 384,97.9 388,122.1 392,137.3 396,131.9 400,110.0 404,88.1 408,82.7 412,97.9 416,122.1 420,137.3 424,131.9 428,110.0 432,88.1 436,82.7 440,97.9 444,122.1 448,137.3 452,131.9 456,110.0 460,88.1 464,82.7 468,97.9 472,122.1 476,137.3 480,131.9"
    stroke="#7C3AED" stroke-width="1.8" fill="none" stroke-linejoin="round"/>

  <text x="150" y="180" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Ns cycles before</text>
  <text x="370" y="180" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="10" font-weight="600" fill="#5B21B6">Ns cycles after</text>

  <line x1="40" y1="200" x2="480" y2="200" stroke="#E2E8F0" stroke-width="1"/>
  <text x="260" y="222" text-anchor="middle" font-family="'Libre Franklin', system-ui, sans-serif" font-size="10.5" fill="#334155">activation current = after &#8722; before, aligned at the voltage zero-crossing</text>
</svg>
