<svg viewBox="0 0 520 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="1" y="1" width="518" height="258" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Input: the meter signal -->
  <circle cx="70" cy="130" r="26" fill="#38BDF8" fill-opacity="0.15" stroke="#0369A1" stroke-width="2"/>
  <polyline points="58,136 64,136 64,124 70,124 70,140 76,140 76,120 82,120"
